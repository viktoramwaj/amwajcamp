<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amwaj Apartments 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 100; align-items: center; justify-content: center; padding: 20px; }
        .modal.active { display: flex !important; }
        .apt-card { transition: all 0.5s; overflow: hidden; border-radius: 3rem; background: white; border: 1px solid #f3f4f6; }
        .apt-card:hover { transform: translateY(-10px); box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15); }
        .nav-btn { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(0,0,0,0.5); color: white; width: 40px; height: 40px; display: flex; items-center; justify-content: center; cursor: pointer; border-radius: 50%; z-index: 10; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans">

    <nav class="bg-white py-6 shadow-sm px-8 flex justify-between items-center sticky top-0 z-40">
        <div class="flex gap-4 text-[10px] font-black text-gray-400 tracking-widest uppercase"><span>RU</span><span>GB</span><span>EG</span><span>ES</span></div>
        <div class="text-red-600 font-black uppercase text-xs italic">Amwaj Oyoun Luxury Project</div>
    </nav>

    <header class="text-center py-16 bg-white border-b">
        <h1 class="text-6xl md:text-8xl font-black mb-4 uppercase text-gray-900 tracking-tighter">Amwaj Apartments</h1>
        <p class="text-2xl text-gray-400 italic font-sans">Directly from the owner Viktor. Best prices 2026.</p>
        <div class="w-28 h-2 bg-red-600 mx-auto mt-10 rounded-full"></div>
    </header>

    <main class="max-w-7xl mx-auto px-6 py-16">
        <h2 class="text-4xl font-black mb-12 border-l-8 border-red-600 pl-6 uppercase text-gray-900 tracking-tight">One Bedroom <span class="text-gray-300 ml-4 font-medium italic text-2xl">$90/night</span></h2>
        <div id="one-bed-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-12 mb-24"></div>

        <h2 class="text-4xl font-black mb-12 border-l-8 border-gray-900 pl-6 uppercase text-gray-900 tracking-tight">Two Bedroom <span class="text-gray-300 ml-4 font-medium italic text-2xl">$180/night</span></h2>
        <div id="two-bed-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-12 mb-28"></div>
    </main>

    <footer class="bg-gray-900 text-white py-24 text-center">
        <div class="max-w-4xl mx-auto px-6">
            <div class="grid md:grid-cols-2 gap-10 mb-16">
                <div class="p-8 border border-gray-800 rounded-[2.5rem] bg-gray-800/30">
                    <p class="text-gray-500 text-[10px] uppercase mb-2 tracking-[0.3em]">Owner (WhatsApp)</p>
                    <p class="text-2xl font-black italic">Viktor: +34 673 567 996</p>
                </div>
                <div class="p-8 border border-gray-800 rounded-[2.5rem] bg-gray-800/30">
                    <p class="text-gray-500 text-[10px] uppercase mb-2 tracking-[0.3em]">Manager (Calls)</p>
                    <p class="text-2xl font-black italic">Sherif: +20 109 617 6893</p>
                </div>
            </div>
            <div onclick="checkAdminPassword()" class="w-20 h-1 bg-white/5 mx-auto cursor-pointer"></div>
        </div>
    </footer>

    <div id="gallery-modal" class="modal">
        <button onclick="closeModal('gallery-modal')" class="absolute top-8 right-10 text-6xl text-white">&times;</button>
        <div onclick="prevImg()" class="nav-btn left-10"><i class="fas fa-chevron-left"></i></div>
        <img id="gallery-img-content" src="" class="max-w-[90%] max-h-[85vh] object-contain rounded-2xl shadow-2xl">
        <div onclick="nextImg()" class="nav-btn right-10"><i class="fas fa-chevron-right"></i></div>
    </div>

    <div id="book-modal" class="modal">
        <div class="bg-white rounded-[4rem] p-12 max-w-md w-full relative text-center">
            <button onclick="closeModal('book-modal')" class="absolute top-8 right-10 text-4xl text-gray-200 hover:text-red-600">&times;</button>
            <h2 id="modal-title" class="text-4xl font-black mb-8 uppercase tracking-tighter">Apt</h2>
            <input type="text" id="date-picker" class="w-full border-4 border-gray-50 p-5 rounded-3xl bg-gray-50 font-black text-2xl text-center mb-6 outline-none focus:border-red-600" placeholder="Выбрать даты">
            <div id="price-calc" class="bg-gray-50 p-8 rounded-[2rem] hidden border-4 border-dashed border-gray-100 mb-8">
                <div class="flex justify-between text-sm mb-2 uppercase font-black text-gray-400"><span>Ночей:</span> <span id="res-nights" class="text-black">0</span></div>
                <div class="flex justify-between text-4xl font-black pt-6 border-t-4 border-white text-red-600 italic"><span>ИТОГО:</span> <span id="res-total">$0</span></div>
            </div>
            <button onclick="sendWhatsApp()" class="w-full bg-green-500 text-white py-6 rounded-[2rem] font-black uppercase shadow-xl hover:bg-green-600 flex items-center justify-center tracking-widest">
                <i class="fab fa-whatsapp mr-4 text-3xl"></i> Забронировать
            </button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyA4Ieznu--vvPpk7d1POxH40Q2y7uG_qF8",
            authDomain: "amwaj-booking.firebaseapp.com",
            databaseURL: "https://amwaj-booking-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "amwaj-booking",
            storageBucket: "amwaj-booking.appspot.com",
            messagingSenderId: "155576333296",
            appId: "1:155576333296:web:21a991bc49e0c508772335"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        let lockedDatesDB = {}; let currentApt = ""; let currentPrice = 0;
        let currentGalleryApt = ""; let currentImgIdx = 1;

        window.onload = () => {
            renderGrids();
            database.ref('lockedDates').on('value', (s) => { lockedDatesDB = s.val() || {}; });
        };

        function renderGrids() {
            const one = ["601", "602", "603", "605", "606", "609"];
            const two = ["201", "202", "203", "204", "205", "206"];
            const oGrid = document.getElementById('one-bed-grid');
            const tGrid = document.getElementById('two-bed-grid');
            one.forEach(n => oGrid.innerHTML += createCard(n, 90, "One Bedroom"));
            two.forEach(n => tGrid.innerHTML += createCard(n, 180, "Two Bedroom"));
        }

        function createCard(n, p, t) {
            return `
                <div class="apt-card shadow-sm">
                    <div class="aspect-[16/10] relative group overflow-hidden">
                        <img src="images/${n}/1.JPG" onclick="openGallery('${n}')" onerror="this.src='images/${n}/1.jpg'" class="w-full h-full object-cover cursor-zoom-in transition duration-1000 group-hover:scale-110">
                        <div class="absolute top-6 right-6 bg-white px-5 py-2 rounded-full font-black shadow-2xl text-xl border-2 border-white italic">$${p}</div>
                    </div>
                    <div class="p-10 bg-white">
                        <h3 class="font-black text-3xl tracking-tighter uppercase text-gray-900 mb-6">Apt #${n}</h3>
                        <button onclick="openBook('${n}', ${p})" class="w-full bg-red-600 text-white py-5 rounded-[1.5rem] font-black uppercase text-xs tracking-widest shadow-2xl transition hover:bg-black">Book Now</button>
                    </div>
                </div>`;
        }

        function openGallery(apt) { currentGalleryApt = apt; currentImgIdx = 1; updateGalleryImg(); document.getElementById('gallery-modal').classList.add('active'); }
        function updateGalleryImg() { document.getElementById('gallery-img-content').src = `images/${currentGalleryApt}/${currentImgIdx}.JPG`; }
        function nextImg() { currentImgIdx = currentImgIdx === 3 ? 1 : currentImgIdx + 1; updateGalleryImg(); }
        function prevImg() { currentImgIdx = currentImgIdx === 1 ? 3 : currentImgIdx - 1; updateGalleryImg(); }

        function openBook(no, price) {
            currentApt = no; currentPrice = price;
            document.getElementById('modal-title').innerText = `Apartment #${no}`;
            document.getElementById('book-modal').classList.add('active');
            flatpickr("#date-picker", {
                mode: "range", minDate: "today", disable: lockedDatesDB[no] || [], dateFormat: "d.m.Y",
                onChange: (dates) => {
                    if (dates.length === 2) {
                        const nights = Math.ceil((dates[1]-dates[0])/(1000*60*60*24));
                        document.getElementById('price-calc').classList.remove('hidden');
                        document.getElementById('res-nights').innerText = nights;
                        document.getElementById('res-total').innerText = "$" + (nights * price);
                    }
                }
            });
        }

        function checkAdminPassword() { if (prompt("Password:") === "1234") alert("Admin mode - Coming soon"); }
        function closeModal(id) { document.getElementById(id).classList.remove('active'); }
        function sendWhatsApp() { window.open(`https://wa.me/34673567996?text=Booking request for Apt #${currentApt}, Dates: ${document.getElementById('date-picker').value}`); }
    </script>
</body>
</html>
