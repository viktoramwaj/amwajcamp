<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amwaj Booking System V.3.1.1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 100; align-items: center; justify-content: center; padding: 20px; }
        .modal.active { display: flex !important; }
        .flatpickr-day.disabled { background: #fee2e2 !important; color: #ef4444 !important; text-decoration: line-through; opacity: 0.5; }
        .flatpickr-day.already-locked { background: #ff0000 !important; color: white !important; border-radius: 50% !important; font-weight: 900 !important; border: 2px solid white !important; }
        .apt-card { transition: all 0.5s; overflow: hidden; border-radius: 2rem; background: white; border: 1px solid #f3f4f6; }
        .apt-card:hover { transform: translateY(-10px); box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15); }
        .apt-img-container { position: relative; overflow: hidden; border-radius: 2rem; margin: 10px; aspect-ratio: 4/3; background: #f3f4f6; }
        .nav-btn { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(255,255,255,0.1); color: white; width: 60px; height: 60px; display: flex; align-items: center; justify-content: center; cursor: pointer; border-radius: 50%; z-index: 10; transition: 0.3s; }
        .nav-btn:hover { background: rgba(255,255,255,0.3); }
        .lang-active { color: #ef4444 !important; text-decoration: underline !important; font-weight: 900 !important; }
        [dir="rtl"] { text-align: right; }
        [dir="rtl"] .border-l-8 { border-left-width: 0; border-right-width: 8px; padding-left: 0; padding-right: 1.5rem; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans">

    <nav class="bg-white py-6 shadow-sm px-8 flex justify-between items-center sticky top-0 z-40">
        <div class="flex gap-4 text-[12px] font-black text-gray-400 tracking-widest uppercase cursor-pointer">
            <span onclick="setLang('GB')" id="btn-GB">GB</span>
            <span onclick="setLang('RU')" id="btn-RU">RU</span>
            <span onclick="setLang('UA')" id="btn-UA">UA</span>
            <span onclick="setLang('EG')" id="btn-EG">EG</span>
            <span onclick="setLang('ES')" id="btn-ES">ES</span>
            <span onclick="setLang('IL')" id="btn-IL">IL</span>
        </div>
        <div class="text-red-600 font-black uppercase text-xs italic tracking-widest">Amwaj Oyoun Luxury Project</div>
    </nav>

    <header class="text-center py-16 bg-white border-b">
        <h1 id="main-title" class="text-6xl md:text-8xl font-black mb-4 uppercase text-gray-900 tracking-tighter">Amwaj Apartments</h1>
        <p id="main-subtitle" class="text-2xl text-gray-400 italic">Directly from the owner Viktor. Best prices 2026.</p>
        <div class="w-28 h-2 bg-red-600 mx-auto mt-10 rounded-full"></div>
    </header>

    <main class="max-w-7xl mx-auto px-6 py-16 text-center md:text-left">
        <h2 id="section-1bed" class="text-4xl font-black mb-12 border-l-8 border-red-600 pl-6 uppercase text-gray-900 tracking-tight">
            <span id="title-1bed"></span> <span class="text-gray-300 ml-4 font-medium italic text-2xl">$90/night</span>
        </h2>
        <div id="one-bed-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-12 mb-24"></div>

        <h2 id="section-2bed" class="text-4xl font-black mb-12 border-l-8 border-gray-900 pl-6 uppercase text-gray-900 tracking-tight">
            <span id="title-2bed"></span> <span class="text-gray-300 ml-4 font-medium italic text-2xl">$180/night</span>
        </h2>
        <div id="two-bed-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-12 mb-28"></div>
    </main>

    <div id="gallery-modal" class="modal">
        <button onclick="closeModal('gallery-modal')" class="absolute top-8 right-10 text-6xl text-white hover:text-red-500">&times;</button>
        <div onclick="prevImg()" class="nav-btn left-10"><i class="fas fa-chevron-left"></i></div>
        <div class="relative group">
            <img id="gallery-img-content" src="" class="max-w-[90vw] max-h-[85vh] object-contain rounded-xl shadow-2xl transition-all duration-500">
            <div id="gallery-counter" class="absolute bottom-4 right-4 bg-black/50 text-white px-4 py-2 rounded-full font-bold">1 / 20</div>
        </div>
        <div onclick="nextImg()" class="nav-btn right-10"><i class="fas fa-chevron-right"></i></div>
    </div>

    <footer class="bg-gray-900 text-white py-12 text-center relative">
        <div class="max-w-4xl mx-auto px-6">
            <h3 id="footer-contacts-title" class="text-xl font-black uppercase mb-6 tracking-widest text-red-600">Contacts</h3>
            <div class="space-y-3 mb-10 text-center">
                <div class="p-4 border border-gray-800 rounded-2xl bg-gray-800/20"><p id="contact-viktor" class="text-base md:text-lg font-bold italic leading-tight"></p></div>
                <div class="p-4 border border-gray-800 rounded-2xl bg-gray-800/20"><p id="contact-sherif" class="text-base md:text-lg font-bold italic leading-tight"></p></div>
            </div>
        </div>
        <div onclick="checkAdminPassword()" class="w-full h-1 bg-white cursor-pointer opacity-10 hover:opacity-100 absolute bottom-0 left-0"></div>
    </footer>

    <script>
        const i18n = {
            GB: { title: "Amwaj Apartments", sub: "Directly from owner Viktor. 2026.", b1: "one bedroom apartments", b2: "two bedroom apartments", nights: "Nights:", disc: "Discount:", book: "Book Now", placeholder: "Select dates", total: "Total:", contacts: "Contacts", viktor: "Mr. Viktor: WhatsApp +34 673 567 996", sherif: "Mr. Sherif: WhatsApp +20 109 617 6893" },
            RU: { title: "Апартаменты Amwaj", sub: "Напрямую от собственника Виктора. 2026.", b1: "апартаменты с одной спальней", b2: "апартаменты с двумя спальнями", nights: "Ночей:", disc: "Скидка:", book: "Забронировать", placeholder: "Выбрать даты", total: "Итого:", contacts: "Контакты", viktor: "М-р Виктор: WhatsApp +34 673 567 996", sherif: "М-р Шериф: WhatsApp +20 109 617 6893" },
            UA: { title: "Апартаменти Amwaj", sub: "Напряму від власника Віктора. 2026.", b1: "апартаменти з однією спальнею", b2: "апартаменти з двома спальнями", nights: "Ночей:", disc: "Знижка:", book: "Забронювати", placeholder: "Вибрати дати", total: "Разом:", contacts: "Контакти", viktor: "М-р Віктор: WhatsApp +34 673 567 996", sherif: "М-р Шериф: WhatsApp +20 109 617 6893" },
            EG: { title: "شقق أمواج", sub: "من المالك فيكتور مباشرة. 2026.", b1: "شقق غرفة نوم واحدة", b2: "شقق غرفتين نوم", nights: "ليالي:", disc: "تخفيض:", book: "احجز الآن", placeholder: "اختر التוاريخ", total: "المجموع:", contacts: "اتصال", viktor: "السيد فيكتور: WhatsApp +34 673 567 996", sherif: "السيد شريف: WhatsApp +20 109 617 6893" },
            ES: { title: "Apartamentos Amwaj", sub: "Directo del propietario Viktor. 2026.", b1: "apartamentos de un dormitorio", b2: "apartamentos de dos dormitorios", nights: "Noches:", disc: "Descuento:", book: "Reservar", placeholder: "Seleccionar fechas", total: "Total:", contacts: "Contactos", viktor: "Sr. Viktor: WhatsApp +34 673 567 996", sherif: "Sr. Sherif: WhatsApp +20 109 617 6893" },
            IL: { title: "דירות אמואז'", sub: "ישירות מהבעלים ויקטור. 2026.", b1: "דירות חדר שינה אחד", b2: "דירות שני חדרי שינה", nights: "לילות:", disc: "הנחה:", book: "הזמן עכשיו", placeholder: "בחר תאריכים", total: "סה\"כ:", contacts: "אנשי קשר", viktor: "מר ויקטור: WhatsApp +34 673 567 996", sherif: "מר שריף: WhatsApp +20 109 617 6893" }
        };

        let currentApt = "", currentGalleryApt = "", currentImgIdx = 1, currentLang = 'GB';

        // Глобальная функция исправления превью
        function smartLoad(img, folder, fileNum) {
            const path = folder + "/" + fileNum;
            img.src = path + ".jpg";
            img.onerror = function() {
                this.src = path + ".JPG";
                this.onerror = function() {
                    this.src = "https://via.placeholder.com/400x300?text=Needs+1.jpg+in+" + folder;
                    this.onerror = null;
                };
            };
        }

        window.onload = () => {
            renderGrids();
            setLang('GB');
            // Принудительный запуск загрузки превью после рендера
            const imgs = document.querySelectorAll('.main-preview');
            imgs.forEach(img => {
                const aptId = img.getAttribute('data-apt');
                smartLoad(img, aptId, '1');
            });
        };

        function setLang(lang) {
            currentLang = lang; const t = i18n[lang];
            document.body.dir = (lang === 'IL') ? 'rtl' : 'ltr';
            document.getElementById('main-title').innerText = t.title;
            document.getElementById('main-subtitle').innerText = t.sub;
            document.getElementById('title-1bed').innerText = t.b1;
            document.getElementById('title-2bed').innerText = t.b2;
            document.getElementById('footer-contacts-title').innerText = t.contacts;
            document.getElementById('contact-viktor').innerText = t.viktor;
            document.getElementById('contact-sherif').innerText = t.sherif;
            document.querySelectorAll('nav span').forEach(el => el.classList.remove('lang-active'));
            document.getElementById(`btn-${lang}`).classList.add('lang-active');
        }

        function renderGrids() {
            const one = ["601", "602", "603", "605", "606", "609"];
            const two = ["201", "202", "203", "204", "205", "206"];
            const oGrid = document.getElementById('one-bed-grid');
            const tGrid = document.getElementById('two-bed-grid');
            one.forEach(n => oGrid.innerHTML += createCard(n, 90, "1 Bedroom"));
            two.forEach(n => tGrid.innerHTML += createCard(n, 180, "2 Bedrooms"));
        }

        function createCard(n, p, t) {
            return `
                <div class="apt-card shadow-sm">
                    <div class="apt-img-container">
                        <img data-apt="${n}" class="main-preview w-full h-full object-cover cursor-zoom-in" onclick="openGallery('${n}')">
                        <div class="absolute top-4 right-4 bg-white/90 backdrop-blur px-4 py-1 rounded-full font-black text-red-600 shadow-lg italic">$${p}</div>
                    </div>
                    <div class="p-8 text-center">
                        <h3 class="font-black text-2xl uppercase">Apartment #${n}</h3>
                        <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-6">${t}</p>
                        <button onclick="window.open('https://wa.me/34673567996')" class="w-full bg-gray-900 text-white py-4 rounded-xl font-black uppercase text-[10px] tracking-widest hover:bg-red-600 transition-colors">Book Now</button>
                    </div>
                </div>`;
        }

        function openGallery(apt) { currentGalleryApt = apt; currentImgIdx = 1; updateGalleryImg(); document.getElementById('gallery-modal').classList.add('active'); }
        function updateGalleryImg() { 
            const img = document.getElementById('gallery-img-content');
            img.style.opacity = '0';
            setTimeout(() => {
                smartLoad(img, currentGalleryApt, currentImgIdx);
                document.getElementById('gallery-counter').innerText = `${currentImgIdx} / 20`;
                img.style.opacity = '1';
            }, 150);
        }
        function nextImg() { currentImgIdx = currentImgIdx === 20 ? 1 : currentImgIdx + 1; updateGalleryImg(); }
        function prevImg() { currentImgIdx = currentImgIdx === 1 ? 20 : currentImgIdx - 1; updateGalleryImg(); }
        function closeModal(id) { document.getElementById(id).classList.remove('active'); }
        function checkAdminPassword() { prompt("Password:"); }
    </script>
</body>
</html>
